<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柿山伏 FC EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111;
  display:flex; align-items:center; justify-content:center;
  width:100vw; height:100vh; overflow:hidden;
  font-family:'DotGothic16',monospace;
}
#crt {
  position:relative;
  width:min(100vw,160vh); height:min(100vh,62.5vw);
  background:#000;
  box-shadow:0 0 0 3px #222,0 0 0 5px #111,0 0 40px rgba(0,200,255,0.08);
  overflow:hidden; display:flex; flex-direction:column;
}
#crt::after {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 1px,rgba(0,0,0,0.28) 1px,rgba(0,0,0,0.28) 2px);
  pointer-events:none; z-index:99;
}
#crt::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,80,120,0.06) 0%,transparent 80%);
  pointer-events:none; z-index:98;
}

/* ── SCENE ── */
#scene-wrap { flex:62; position:relative; overflow:hidden; }
canvas { width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; }

/* SFX */
#sfx {
  position:absolute; top:44%; left:50%; transform:translate(-50%,-50%);
  font-family:'Press Start 2P',monospace; font-size:clamp(13px,3.8vw,42px);
  color:#F8B800; text-shadow:2px 2px 0 #E45C10,4px 4px 0 #000;
  opacity:0; pointer-events:none; z-index:90; white-space:nowrap; text-align:center;
  line-height:1.4;
}
#sfx.pop  { animation:sfx-pop  2s ease forwards; }
#sfx.fall { color:#F83800; text-shadow:2px 2px 0 #8B0000,4px 4px 0 #000; animation:fall-pop 2.2s ease forwards; }
#sfx.magic{ color:#E800E8; text-shadow:2px 2px 0 #600060,4px 4px 0 #000; animation:magic-pop 2.5s ease forwards; font-size:clamp(10px,2.6vw,28px); }
@keyframes sfx-pop  { 0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-8deg)} 12%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(3deg)} 22%{transform:translate(-50%,-50%) scale(.95) rotate(0)} 70%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(.8)} }
@keyframes fall-pop { 0%{opacity:0;transform:translate(-50%,-55%) scale(.2) rotate(-12deg)} 10%{opacity:1;transform:translate(-50%,-55%) scale(1.5) rotate(5deg)} 20%{transform:translate(-50%,-50%) scale(1) rotate(-2deg)} 65%{opacity:1} 100%{opacity:0} }
@keyframes magic-pop{ 0%{opacity:0;transform:translate(-50%,-50%) scale(.5)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(-2deg)} 30%{transform:translate(-50%,-50%) scale(1) rotate(2deg)} 70%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(.9) rotate(-4deg)} }

#scene-wrap.flash { animation:scn-flash .15s ease; }
@keyframes scn-flash { 0%,100%{filter:brightness(1)} 50%{filter:brightness(2.5)} }
#scene-wrap.shake { animation:scn-shake .45s ease; }
@keyframes scn-shake { 0%,100%{transform:translate(0,0)} 15%{transform:translate(-5px,4px)} 30%{transform:translate(5px,-4px)} 50%{transform:translate(-4px,3px)} 70%{transform:translate(3px,-3px)} 85%{transform:translate(-2px,2px)} }

/* HUD */
#hud { position:absolute; top:4px; left:6px; display:flex; gap:4px; z-index:50; }
.hud-dot { width:6px; height:6px; background:#333; border:1px solid #555; }
.hud-dot.on   { background:#F8B800; border-color:#F8B800; box-shadow:0 0 4px #F8B800; }
.hud-dot.act2 { background:#C800C8; border-color:#C800C8; box-shadow:0 0 4px #C800C8; }
#act-label { position:absolute; top:4px; right:6px; font-family:'Press Start 2P',monospace; font-size:clamp(4px,.8vw,7px); color:#484848; z-index:50; }

/* ── UI AREA — fixed split ── */
#ui {
  flex:38;
  background:#000;
  display:flex;
  flex-direction:column;
  padding: clamp(4px,1vh,8px) clamp(6px,1.2vw,12px) clamp(3px,.8vh,6px);
  gap: clamp(2px,.5vh,4px);
  border-top:3px solid #FCFCFC;
  overflow:hidden;          /* clip any text overflow */
}

/* Dialogue — takes remaining space above choices */
#dlg {
  flex: 1;
  min-height: 0;            /* allow shrinking in flex */
  border:3px solid #FCFCFC;
  background:#000014;
  position:relative;
  padding: clamp(5px,1vh,9px) clamp(7px,1.2vw,13px);
  overflow:hidden;
}
#speaker {
  position:absolute; top:-11px; left:10px;
  background:#000; padding:0 5px;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(5px,.9vw,8px); color:#F8B800;
  white-space:nowrap; letter-spacing:.05em;
}
#txt {
  font-family:'DotGothic16',monospace;
  font-size:clamp(11px,1.9vw,17px);
  color:#FCFCFC; line-height:1.8;
  word-break:break-all;
}
#cur {
  display:inline; color:#FCFCFC;
  font-size:clamp(8px,1.4vw,12px);
  visibility:hidden; animation:blink .75s step-end infinite;
}
#cur.on { visibility:visible; }
@keyframes blink { 0%,100%{visibility:visible} 50%{visibility:hidden} }

/* Choices — FIXED height, always 2 rows */
#choices {
  flex: 0 0 clamp(64px,13vh,96px);  /* ← fixed, never changes */
  display:flex;
  flex-direction:column;
  gap: clamp(1px,.35vh,4px);
  overflow:hidden;
}
.ch {
  flex:1;                            /* each choice fills half of fixed box */
  display:flex; align-items:center;
  gap:clamp(4px,.8vw,8px);
  padding:0 clamp(5px,1vw,10px);
  cursor:pointer; border:2px solid transparent;
  transition:border-color .1s, background .1s;
  min-height:0;
}
.ch::before {
  content:'►'; font-family:'Press Start 2P',monospace;
  font-size:clamp(5px,.9vw,8px); color:#F8B800;
  opacity:0; width:clamp(10px,1.5vw,14px); flex-shrink:0; transition:opacity .1s;
}
.ch:hover { border-color:rgba(252,252,252,.25); background:rgba(252,252,252,.04); }
.ch:hover::before { opacity:1; }
.ch-label {
  font-family:'DotGothic16',monospace;
  font-size:clamp(9px,1.7vw,15px); color:#FCFCFC;
  line-height:1.45; word-break:break-all;
}

/* ── TITLE ── */
#title {
  position:absolute; inset:0; background:#000; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:clamp(5px,1.3vh,12px); cursor:pointer;
}
.tl-sm  { font-family:'Press Start 2P',monospace; font-size:clamp(5px,.9vw,8px); color:#484848; letter-spacing:.15em; }
.tl-kaki{ font-size:clamp(26px,6.5vw,58px); animation:bounce 1.4s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.tl-big { font-family:'Press Start 2P',monospace; font-size:clamp(18px,4.8vw,50px); color:#F8B800; text-shadow:3px 3px 0 #E45C10,5px 5px 0 #000; animation:glow 2s ease-in-out infinite; }
@keyframes glow { 0%,100%{text-shadow:3px 3px 0 #E45C10} 50%{text-shadow:3px 3px 0 #E45C10,0 0 20px #F8B800} }
.tl-sub  { font-family:'Press Start 2P',monospace; font-size:clamp(5px,1vw,8px); color:#848484; letter-spacing:.1em; }
.tl-press{ font-family:'Press Start 2P',monospace; font-size:clamp(7px,1.3vw,11px); color:#FCFCFC; border:2px solid #FCFCFC; padding:clamp(4px,.8vh,7px) clamp(9px,1.8vw,18px); animation:blink 1.1s step-end infinite; margin-top:clamp(3px,.8vh,8px); }

/* ── END ── */
#endscr {
  position:absolute; inset:0; background:rgba(0,0,0,.97); z-index:150;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:clamp(4px,1vh,10px); padding:clamp(10px,2vw,20px);
}
#endscr.on { display:flex; animation:end-in .5s ease; }
@keyframes end-in { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
.e-num { font-family:'Press Start 2P',monospace; font-size:clamp(5px,.9vw,8px); color:#484848; }
.e-num.te { color:#C800C8; animation:glow-p 1.5s ease-in-out infinite; }
@keyframes glow-p { 0%,100%{color:#C800C8} 50%{color:#F800F8;text-shadow:0 0 10px #F800F8} }
.e-ico { font-size:clamp(26px,5.5vw,50px); }
.e-ttl { font-family:'Press Start 2P',monospace; font-size:clamp(10px,2.3vw,20px); color:#F8B800; text-shadow:2px 2px 0 #E45C10; text-align:center; }
.e-ttl.te { color:#F800F8; text-shadow:2px 2px 0 #800080; }
.e-box { border:3px solid #FCFCFC; padding:clamp(7px,1.3vh,14px) clamp(9px,1.8vw,18px); max-width:88%; background:#000014; }
.e-box.te { border-color:#C800C8; box-shadow:0 0 12px rgba(200,0,200,.3); }
.e-text { font-family:'DotGothic16',monospace; font-size:clamp(10px,1.8vw,16px); color:#FCFCFC; line-height:2; text-align:center; }
.e-retry { font-family:'Press Start 2P',monospace; font-size:clamp(6px,1.2vw,10px); background:#F8B800; color:#000; border:none; padding:clamp(4px,.9vh,8px) clamp(10px,2vw,20px); cursor:pointer; margin-top:clamp(2px,.6vh,6px); }
.e-retry:hover { background:#FCFCFC; }

/* Fade */
#fade { position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; z-index:80; transition:opacity .35s ease; }
#fade.dark { opacity:1; }
</style>
</head>
<body>
<div id="crt">

  <!-- TITLE -->
  <div id="title" onclick="startGame()">
    <div class="tl-sm">FAMICOM STYLE KYOGEN</div>
    <div class="tl-kaki">🍊</div>
    <div class="tl-big">柿山伏</div>
    <div class="tl-sub">〜 かけあいシミュレーター 〜</div>
    <div class="tl-press">▶ PUSH START ◀</div>
    <div class="tl-sm" style="margin-top:3px">© 1986 YAMABUSHI SOFT</div>
  </div>

  <!-- SCENE -->
  <div id="scene-wrap">
    <canvas id="cv" width="256" height="152"></canvas>
    <div id="hud">
      <div class="hud-dot" id="d0"></div>
      <div class="hud-dot" id="d1"></div>
      <div class="hud-dot" id="d2"></div>
      <div class="hud-dot" id="d3"></div>
      <div class="hud-dot" id="d4"></div>
      <div class="hud-dot" id="d5"></div>
    </div>
    <div id="act-label">ACT 1</div>
    <div id="sfx"></div>
    <div id="fade"></div>
  </div>

  <!-- UI: dialogue + choices (always 2) -->
  <div id="ui">
    <div id="dlg">
      <div id="speaker">【 語り手 】</div>
      <div id="txt"><span id="tc"></span><span id="cur">▼</span></div>
    </div>
    <div id="choices"></div>
  </div>

  <!-- END -->
  <div id="endscr">
    <div class="e-num" id="e-num">＜ ENDING ＞</div>
    <div class="e-ico" id="e-ico">🍊</div>
    <div class="e-ttl" id="e-ttl">エンド</div>
    <div class="e-box" id="e-box"><div class="e-text" id="e-txt"></div></div>
    <button class="e-retry" onclick="goTitle()">▶ タイトルへもどる</button>
  </div>

</div>
<script>
// ══════════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════════
const cv=document.getElementById('cv'), cx=cv.getContext('2d');
cx.imageSmoothingEnabled=false;
const W=256,H=152,S=3;

function r(x,y,w,h,c){ if(w>0&&h>0){cx.fillStyle=c;cx.fillRect(x,y,w,h);} }
function circle(ox,oy,rad,c){
  cx.fillStyle=c;
  for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++)
    if(dx*dx+dy*dy<=rad*rad)cx.fillRect(ox+dx,oy+dy,1,1);
}
function oval(ox,oy,rx,ry,c){
  cx.fillStyle=c;
  for(let dy=-ry;dy<=ry;dy++)for(let dx=-rx;dx<=rx;dx++)
    if(dx*dx/(rx*rx)+dy*dy/(ry*ry)<=1)cx.fillRect(ox+dx,oy+dy,1,1);
}

// ─── BACKGROUND ───
function drawBG(){
  r(0,0,W,106,'#0038EC'); r(0,0,W,16,'#000080');
  cx.fillStyle='#FCFCFC';
  [[14,4],[32,10],[55,6],[82,18],[107,7],[133,3],[158,11],[183,19],[206,5],[228,13],[244,8],
   [22,25],[47,30],[74,22],[101,33],[126,19],[152,28],[177,22],[202,30],[233,24]
  ].forEach(([x,y])=>cx.fillRect(x,y,1,1));
  for(let dy=0;dy<14;dy++)for(let dx=0;dx<14;dx++)
    if((dx-7)*(dx-7)+(dy-7)*(dy-7)<=42)r(220+dx,9+dy,1,1,'#FCD8A8');
  r(224,12,2,2,'#E8B870'); r(228,16,1,1,'#E8B870');
  [[40,100,52],[95,92,48],[148,98,42],[200,93,58]].forEach(([px,py,w])=>{
    cx.fillStyle='#000068';
    for(let y=py;y<=108;y++){const s2=((y-py)/(108-py))*(w/2);cx.fillRect(Math.floor(px-s2),y,Math.ceil(s2*2),1);}
  });
  r(0,106,W,46,'#503000'); r(0,106,W,3,'#715018');
  cx.fillStyle='#006800';
  for(let x=0;x<W;x+=13){cx.fillRect(x,104,2,4);cx.fillRect(x+4,103,2,5);cx.fillRect(x+8,105,2,3);}
  cx.fillStyle='#3D2000';
  for(let y=118;y<H;y+=10)cx.fillRect(0,y,W,1);
  cx.fillStyle='rgba(0,0,0,0.1)';
  for(let x=22;x<W;x+=24)cx.fillRect(x,109,1,43);
}

// ─── KAKI TREE ───
const TX=156;
function drawTree(){
  r(TX+13,96,7,13,'#714A0C'); r(TX+13,96,2,13,'#4A2800');
  r(TX+4,88,10,3,'#714A0C'); r(TX+17,84,9,3,'#714A0C'); r(TX+14,78,4,12,'#714A0C');
  circle(TX+16,84,19,'#005800'); circle(TX+8,88,15,'#006A00'); circle(TX+24,85,14,'#005000');
  circle(TX+16,70,15,'#007800'); circle(TX+9,76,11,'#005C00'); circle(TX+23,74,12,'#006000');
  [[TX+5,82,'#E45C00'],[TX+20,76,'#F07020'],[TX+29,84,'#E43000'],
   [TX+13,68,'#F08020'],[TX+27,72,'#E45C00'],[TX+5,93,'#F06000'],[TX+24,90,'#E85010']
  ].forEach(([x,y,c])=>{oval(x,y,4,4,c);r(x+1,y-3,2,3,'#005800');r(x,y-4,4,1,'#006200');});
}

// ─── YAMABUSHI ───
function drawYamabushi(o){
  if(!o)o={};
  if(o.fallen){
    const fx=o.fx||140,fy=102;
    r(fx,fy,36,S,'#000'); r(fx+2,fy+S,30,S,'#000'); r(fx+14,fy-S,4,S,'#BC0000');
    r(fx+4,fy+2*S,28,4*S,'#E8E0D0'); r(fx+4,fy+3*S,28,S,'#BC0000');
    r(fx,fy+2*S,5,3*S,'#D89060');
    r(fx+2,fy+2*S+1,1,1,'#000'); r(fx+3,fy+2*S+2,1,1,'#000'); r(fx+2,fy+2*S+2,1,1,'#000');
    r(fx+36,fy,1,8,'#F8B800'); r(fx+38,fy+2,1,6,'#F8B800'); r(fx+40,fy+1,1,5,'#F8B800');
    return;
  }
  const x=o.inTree?146:(o.px||178), y=o.inTree?38:(o.py||54);
  // hat
  r(x+2*S,y,8*S,S,'#000'); r(x+S,y+S,10*S,2*S,'#000'); r(x,y+3*S,12*S,S,'#000');
  r(x+5*S,y,2*S,S,'#BC0000'); r(x+4*S,y+S,4*S,S,'#F83800'); r(x+5*S,y+2*S,2*S,S,'#BC0000');
  // face
  r(x+3*S,y+4*S,6*S,5*S,'#D89060');
  r(x+4*S,y+5*S,S,S,'#000'); r(x+7*S,y+5*S,S,S,'#000');
  if(o.chanting){
    r(x+3*S,y+4*S,3*S,1,'#3D1800'); r(x+7*S,y+4*S,3*S,1,'#3D1800');
    r(x+4*S,y+7*S,4*S,2*S,'#000'); r(x+5*S,y+8*S,2*S,S,'#D89060');
    r(x-S,y+9*S,S,5*S,'#E8E0D0'); r(x-2*S,y+7*S,S,3*S,'#E8E0D0'); r(x-2*S,y+6*S,S,S,'#D89060');
    r(x+13*S,y+9*S,S,5*S,'#E8E0D0'); r(x+14*S,y+7*S,S,3*S,'#E8E0D0'); r(x+14*S,y+6*S,S,S,'#D89060');
    for(let i=0;i<8;i++)r(x+11*S-i,y+3*S+i,S,S,'#714A0C');
    r(x+11*S,y+2*S,2*S,S,'#F8B800'); r(x+10*S,y+3*S,2*S,S,'#F8B800');
  } else {
    r(x+4*S,y+4*S+1,2*S,1,'#3D1800'); r(x+7*S,y+4*S+1,2*S,1,'#3D1800');
    if(o.shouting){ r(x+4*S,y+7*S,4*S,2*S,'#000'); r(x+5*S,y+8*S,2*S,S,'#D89060'); }
    else           { r(x+5*S,y+8*S,2*S,1,'#6B2010'); }
    r(x+12*S,y+3*S,S,14*S,'#714A0C');
    r(x+12*S,y+3*S,2*S,S,'#F8B800'); r(x+12*S,y+5*S,2*S,S,'#F8B800'); r(x+12*S,y+7*S,2*S,S,'#F8B800');
  }
  r(x+S,y+9*S,10*S,7*S,'#E8E0D0');
  r(x+4*S,y+9*S,4*S,4*S,'#C8BEA8'); r(x+5*S,y+9*S,2*S,5*S,'#BCB4A0');
  r(x+S,y+12*S,10*S,S,'#BC0000'); r(x+S,y+13*S,10*S,S,'#8B0000');
  r(x+2*S,y+16*S,3*S,2*S,'#C8C0B0'); r(x+7*S,y+16*S,3*S,2*S,'#C8C0B0');
  r(x+S,y+17*S,4*S,S,'#714A0C'); r(x+7*S,y+17*S,4*S,S,'#714A0C');
}

// ─── TEISHU ───
function drawTeishu(o){
  if(!o)o={};
  const x=o.px!==undefined?o.px:18, y=54;
  const {angry,laughing}=o;
  r(x+4*S,y,4*S,S,'#1A2840'); r(x+3*S,y+S,6*S,2*S,'#1A2840'); r(x+S,y+3*S,10*S,S,'#253060');
  r(x+3*S,y+4*S,6*S,5*S,'#D89060');
  if(angry){
    r(x+4*S,y+4*S,2*S,1,'#2D1000'); r(x+4*S+1,y+4*S+1,1,1,'#2D1000');
    r(x+7*S,y+5*S,2*S,1,'#2D1000'); r(x+7*S-1,y+4*S,1,1,'#2D1000');
  } else {
    r(x+4*S,y+4*S+1,2*S,1,'#3D1800'); r(x+7*S,y+4*S+1,2*S,1,'#3D1800');
  }
  r(x+4*S,y+6*S,S,S,'#000'); r(x+7*S,y+6*S,S,S,'#000');
  r(x+4*S,y+8*S,4*S,S,'#3D2000');
  if(laughing){ r(x+4*S,y+8*S,4*S,2*S,'#000'); r(x+5*S,y+9*S,2*S,S,'#D89060'); }
  else         { r(x+5*S,y+8*S+2,2*S,1,'#6B2010'); }
  r(x+S,y+9*S,10*S,7*S,'#1A2840');
  r(x+3*S,y+9*S,5*S,3*S,'#C8A050'); r(x+4*S,y+9*S,3*S,4*S,'#B89040');
  r(x+S,y+12*S,10*S,S,'#8B6010'); r(x+S,y+13*S,10*S,S,'#6B4800');
  if(angry){ r(x-3*S,y+9*S,3*S,2*S,'#1A2840'); r(x-4*S,y+8*S,2*S,3*S,'#D89060'); }
  r(x+2*S,y+16*S,3*S,2*S,'#C0C8B8'); r(x+7*S,y+16*S,3*S,2*S,'#C0C8B8');
  r(x+S,y+17*S,4*S,S,'#3D2010'); r(x+7*S,y+17*S,4*S,S,'#3D2010');
}

// ─── PIGGYBACK ───
function drawPiggyback(){
  const rx=94,ry=22;
  r(rx+2*S,ry,8*S,S,'#000'); r(rx+S,ry+S,10*S,2*S,'#000'); r(rx,ry+3*S,12*S,S,'#000');

// ─── SCENE RENDER ───
function renderScene(st){
  if(!st)return;
  cx.clearRect(0,0,W,H); drawBG(); drawTree();
  if(st.piggyback){ drawPiggyback(); return; }
  if(st.showTeishu){
    const px=st.teishuFlee?178:st.teishuRight?158:st.teishuApproach?62:18;
    drawTeishu({angry:!!st.angry,laughing:!!st.laughing,px});
  }
  if(st.showYama){
    if(st.inTree)         drawYamabushi({inTree:true});
    else if(st.fallen)    drawYamabushi({fallen:true,fx:st.fx||140});
    else if(st.chanting)  drawYamabushi({px:96,py:54,chanting:true});
    else if(st.recovered) drawYamabushi({px:96,py:54,shouting:true});
    else                  drawYamabushi({px:178,py:54});
  }
}

// ══════════════════════════════════════════════
//  TYPEWRITER
// ══════════════════════════════════════════════
let twTimer=null,isTyping=false;
function typeText(text,speed=40){
  return new Promise(resolve=>{
    clearTimeout(twTimer);
    const tc=document.getElementById('tc'), cur=document.getElementById('cur');
    tc.innerHTML=''; cur.classList.remove('on');
    isTyping=true; let i=0;
    function tick(){
      if(i<text.length){
        if(text[i]==='\n') tc.innerHTML+='\n';
        else tc.textContent+=text[i];
        // re-apply after textContent overwrite
        if(text[i]==='\n'){ tc.innerHTML=tc.textContent.replace(/\n/g,'<br>'); }
        i++; twTimer=setTimeout(tick,speed);
      } else { isTyping=false; cur.classList.add('on'); resolve(); }
    }
    tick();
  });
}
// Better typewriter handling newlines
function typeText2(text,speed=40){
  return new Promise(resolve=>{
    clearTimeout(twTimer);
    const tc=document.getElementById('tc'), cur=document.getElementById('cur');
    tc.innerHTML=''; cur.classList.remove('on');
    isTyping=true;
    const chars=[...text];
    let i=0, html='';
    function tick(){
      if(i<chars.length){
        html += chars[i]==='\n' ? '<br>' : chars[i].replace(/&/g,'&amp;').replace(/</g,'&lt;');
        tc.innerHTML=html;
        i++; twTimer=setTimeout(tick,speed);
      } else { isTyping=false; cur.classList.add('on'); resolve(); }
    }
    tick();
  });
}

// ══════════════════════════════════════════════
//  SFX
// ══════════════════════════════════════════════
function showSFX(text,isFall,isMagic){
  const el=document.getElementById('sfx'), sw=document.getElementById('scene-wrap');
  el.textContent=text; el.className=''; void el.offsetWidth;
  el.className=isFall?'fall':isMagic?'magic':'pop';
  sw.classList.add(isFall?'shake':'flash');
  setTimeout(()=>sw.classList.remove('shake','flash'),isFall?460:200);
  setTimeout(()=>{el.className='';},isFall?2300:isMagic?2600:2200);
}

// ══════════════════════════════════════════════
//  SCENE LOAD
// ══════════════════════════════════════════════
async function loadScene(id,sfxText,sfxFall,sfxMagic){
  const sc=SCENES[id]; if(!sc)return;
  const fade=document.getElementById('fade');
  fade.classList.add('dark'); await sleep(340);
  renderScene(sc);
  updateDots(sc.progress||0,sc.act||1);
  document.getElementById('act-label').textContent=sc.act===2?'ACT 2':'ACT 1';
  document.getElementById('speaker').textContent='【 '+sc.speaker+' 】';
  document.getElementById('choices').innerHTML='';
  document.getElementById('cur').classList.remove('on');
  fade.classList.remove('dark'); await sleep(120);
  if(sfxText){ showSFX(sfxText,!!sfxFall,!!sfxMagic); await sleep(1100); }
  await typeText2(sc.text);
  buildChoices(sc.ch);
}

function buildChoices(chs){
  const box=document.getElementById('choices');
  box.innerHTML='';
  (chs||[]).forEach(c=>{
    const d=document.createElement('div');
    d.className='ch';
    d.innerHTML=`<span class="ch-label">${c.t}</span>`;
    d.onclick=()=>handleChoice(c);
    box.appendChild(d);
  });
}

// ══════════════════════════════════════════════
//  CHOICE HANDLER
// ══════════════════════════════════════════════
async function handleChoice(c){
  if(isTyping)return;
  document.getElementById('choices').innerHTML='';
  document.getElementById('cur').classList.remove('on');

  if(c.fall){
    showSFX(c.sfx,true,false);
    await sleep(530);
    renderScene(c.fallCanvas||{showYama:true,showTeishu:true,fallen:true,laughing:true});
    await sleep(1800);
    c.n.startsWith('e') ? showEnd(c.n) : loadScene(c.n);
  } else if(c.n.startsWith('e')){
    if(c.sfx){ showSFX(c.sfx,false,!!c.magic); await sleep(2100); }
    showEnd(c.n);
  } else {
    loadScene(c.n, c.sfx||null, false, !!c.magic);
  }
}

// ══════════════════════════════════════════════
//  ENDING
// ══════════════════════════════════════════════
function showEnd(id){
  const e=ENDS[id]; if(!e)return;
  document.getElementById('e-num').textContent=e.num;
  document.getElementById('e-num').className=e.trueEnd?'e-num te':'e-num';
  document.getElementById('e-ico').textContent=e.ico;
  document.getElementById('e-ttl').textContent=e.ttl;
  document.getElementById('e-ttl').className=e.trueEnd?'e-ttl te':'e-ttl';
  document.getElementById('e-box').className=e.trueEnd?'e-box te':'e-box';
  document.getElementById('e-txt').innerHTML=e.txt.replace(/\n/g,'<br>');
  document.getElementById('endscr').classList.add('on');
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function updateDots(n,act){
  for(let i=0;i<6;i++){
    const d=document.getElementById('d'+i); if(!d)continue;
    d.className=i<=n ? (act===2?'hud-dot act2':'hud-dot on') : 'hud-dot';
  }
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ══════════════════════════════════════════════
//  START / TITLE
// ══════════════════════════════════════════════
function startGame(){
  const t=document.getElementById('title');
  t.style.opacity='0'; t.style.transition='opacity .4s';
  setTimeout(()=>{t.style.display='none';t.style.opacity='1';t.style.transition='';},400);
  loadScene('s1');
}
function goTitle(){
  document.getElementById('endscr').classList.remove('on');
  document.getElementById('act-label').textContent='ACT 1';
  const t=document.getElementById('title');
  t.style.display='flex'; t.style.opacity='0'; t.style.transition='opacity .5s';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.opacity='1';}));
  setTimeout(()=>{t.style.transition='';},600);
}
